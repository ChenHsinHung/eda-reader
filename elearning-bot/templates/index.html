<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eLearning Bot - 自動學習機器人</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="fas fa-robot"></i> eLearning Bot
            </span>
            <div class="d-flex">
                <button id="refreshBtn" class="btn btn-outline-light me-2">
                    <i class="fas fa-sync-alt"></i> 刷新
                </button>
                <div id="statusBadge" class="badge bg-secondary">未連接</div>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- 控制面板 -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">
                            <i class="fas fa-cogs"></i> 控制面板
                        </h5>
                    </div>
                    <div class="card-body">
                        <!-- 課程選擇 -->
                        <div class="mb-3">
                            <label class="form-label">選擇課程</label>
                            <select id="courseSelect" class="form-select" multiple size="5">
                                <option>載入中...</option>
                            </select>
                            <div class="form-text">按住 Ctrl 選擇多個課程</div>
                        </div>

                        <!-- 課程數量限制 -->
                        <div class="mb-3">
                            <label class="form-label">最多處理課程數</label>
                            <input type="number" id="maxCourses" class="form-control" min="0" value="0" placeholder="0 = 全部">
                        </div>

                        <!-- 控制按鈕 -->
                        <div class="d-grid gap-2">
                            <button id="startBtn" class="btn btn-success" disabled>
                                <i class="fas fa-play"></i> 開始學習
                            </button>
                            <button id="stopBtn" class="btn btn-danger" disabled>
                                <i class="fas fa-stop"></i> 停止學習
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 進度顯示 -->
                <div class="card mt-3">
                    <div class="card-header">
                        <h5 class="card-title mb-0">
                            <i class="fas fa-chart-line"></i> 學習進度
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="progress mb-3">
                            <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                        </div>
                        <div class="text-center">
                            <div id="progressText">0 / 0 課程</div>
                            <div id="currentCourse" class="text-muted small"></div>
                            <div id="currentAction" class="text-muted small"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 日誌顯示 -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0">
                            <i class="fas fa-terminal"></i> 操作日誌
                        </h5>
                        <div>
                            <button id="clearLogBtn" class="btn btn-sm btn-outline-secondary">
                                <i class="fas fa-trash"></i> 清除
                            </button>
                            <button id="exportLogBtn" class="btn btn-sm btn-outline-primary">
                                <i class="fas fa-download"></i> 導出
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="logContainer" class="log-container">
                            <div class="log-entry text-muted">等待連接...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 載入動畫 -->
    <div id="loadingOverlay" class="loading-overlay d-none">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">載入中...</span>
        </div>
    </div>

    <!-- 腳本 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
